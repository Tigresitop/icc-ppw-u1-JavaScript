<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Práctica 8 - Validación de Formularios</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
    <header class="header">
        <h1>Registro de Usuario</h1>
        <p>Completa tus datos para crear una cuenta</p>
    </header>

    <form id="form-registro" class="form" novalidate>
        <div class="form-group">
        <label for="nombre">Nombre Completo *</label>
        <input type="text" id="nombre" name="nombre" class="form-control" required minlength="3">
        <div class="error-mensaje"></div>
        </div>

        <div class="form-group">
        <label for="email">Correo Electrónico *</label>
        <input type="email" id="email" name="email" class="form-control" required>
        <div class="error-mensaje"></div>
        </div>

        <div class="form-group">
        <label for="telefono">Teléfono *</label>
        <input type="tel" id="telefono" name="telefono" class="form-control" placeholder="(099) 999-9999" required>
        <div class="error-mensaje"></div>
        </div>

        <div class="form-group">
        <label for="fecha_nacimiento">Fecha de Nacimiento *</label>
        <input type="date" id="fecha_nacimiento" name="fecha_nacimiento" class="form-control" required>
        <div class="error-mensaje"></div>
        </div>

        <div class="form-group">
        <label for="genero">Género *</label>
        <select id="genero" name="genero" class="form-control" required>
            <option value="">Selecciona una opción...</option>
            <option value="masculino">Masculino</option>
            <option value="femenino">Femenino</option>
            <option value="otro">Otro</option>
        </select>
        <div class="error-mensaje"></div>
        </div>

        <div class="form-group">
        <label for="password">Contraseña *</label>
        <input type="password" id="password" name="password" class="form-control" required>
        <div id="password-strength" class="password-strength"></div>
        <div class="error-mensaje"></div>
        </div>

        <div class="form-group">
        <label for="confirmar_password">Confirmar Contraseña *</label>
        <input type="password" id="confirmar_password" name="confirmar_password" class="form-control" required>
        <div class="error-mensaje"></div>
        </div>

        <div class="form-group checkbox-group">
        <label class="checkbox-label">
            <input type="checkbox" id="terminos" name="terminos" required>
          Acepto los términos y condiciones *
        </label>
        <div class="error-mensaje"></div>
        </div>

        <div id="mensaje-global" class="mensaje-global"></div>

        <button type="submit" id="btn-submit" class="btn-submit" disabled>Crear Cuenta</button>
    </form>
    </div>

    <script src="js/validacion.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
